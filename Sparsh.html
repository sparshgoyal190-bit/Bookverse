<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BookVerse Store</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f5f5f5;
}

/* HEADER */
header{
  background:#131921;
  color:white;
  padding:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  position:sticky;
  top:0;
}

.logo{
  font-size:20px;
  font-weight:bold;
}

.search input{
  width:200px;
  padding:8px;
  border:none;
  border-radius:4px;
}

/* PRODUCTS */
.container{
  padding:15px;
}

.products{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
}

@media(min-width:768px){
  .products{
    grid-template-columns:repeat(4,1fr);
  }
}

.card{
  background:white;
  border-radius:10px;
  overflow:hidden;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.card img{
  width:100%;
  height:180px;
  object-fit:cover;
}

.card-content{
  padding:10px;
}

.price{
  color:green;
  font-weight:bold;
}

.btn{
  display:block;
  text-align:center;
  background:#ff9900;
  color:black;
  padding:8px;
  margin-top:8px;
  border-radius:20px;
  text-decoration:none;
  font-weight:bold;
}
</style>
</head>

<body>

<header>
  <div class="logo">📚 BookVerse</div>

  <div class="search">
    <input id="search" placeholder="Search books...">
  </div>
</header>

<div class="container">

<div class="products" id="list">

  <div class="card">
    <img src="https://images.unsplash.com/photo-1544947950-fa07a98d237f?w=800">
    <div class="card-content">
      <h4>Rich Dad Poor Dad</h4>
      <p class="price">₹299</p>
      <a class="btn" href="https://www.amazon.in" target="_blank">Buy Now</a>
    </div>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1512820790803-83ca734da794?w=800">
    <div class="card-content">
      <h4>Atomic Habits</h4>
      <p class="price">₹399</p>
      <a class="btn" href="https://www.amazon.in" target="_blank">Buy Now</a>
    </div>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1495446815901-a7297e633e8d?w=800">
    <div class="card-content">
      <h4>Psychology of Money</h4>
      <p class="price">₹349</p>
      <a class="btn" href="https://www.amazon.in" target="_blank">Buy Now</a>
    </div>
  </div>

</div>

</div>

<script>
let search = document.getElementById("search");

search.addEventListener("input", function(){
  let value = this.value.toLowerCase();
  let cards = document.querySelectorAll(".card");

  cards.forEach(card=>{
    let name = card.querySelector("h4").innerText.toLowerCase();
    if(name.includes(value)){
      card.style.display="block";
    }else{
      card.style.display="none";
    }
  });
});
</script>

</body>
</html>
